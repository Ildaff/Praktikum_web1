<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cara membuat telur Goreng</title>
</head>
<body>
    <h2>Bahan Bahan Memasak Telur Goreng </h2>
    <ul style="list-style-type: circle;">
        <li>Telur 5 butir</li>
        <li>Minyak 5 sdm</li>
        <li>Garam 2/4 sdm</li>
        <li>Royko 2/4 sdm</li>
</ul>
<h3>Cara Memasak Telur goreng</h3>
<ol type="1">
        <li>Campur semua bahan diatas</li>
        <li>Aduk semuanya hingga tercampur</li>
        <li>Panaskan minyak</li>
        <li>Ketika minyak panas langsung saja digoreng</li>
 
</body>
</html>
